<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中文 Mandarin Learning App</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#f0f4ff 0%,#e8f5ff 100%);color:#111;min-height:100vh}
/* HEADER */
.hdr{background:#fff;border-bottom:2px solid #fee2e2;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.08);position:sticky;top:0;z-index:100}
.hdr-l h1{font-size:22px;font-weight:800;color:#b91c1c;letter-spacing:-.3px}
.hdr-l p{font-size:12px;color:#6b7280;margin-top:2px}
.hdr-r{display:flex;align-items:center;gap:20px}
.streak-box{display:flex;align-items:center;gap:5px}
.streak-box i{color:#f97316;font-size:18px}
.streak-num{font-size:22px;font-weight:800;color:#f97316}
.streak-lbl{font-size:10px;color:#6b7280;display:block;line-height:1}
.prog-box{text-align:right}
.prog-num{font-size:22px;font-weight:800;color:#2563eb}
.prog-lbl{font-size:10px;color:#6b7280}
/* TABS */
.tabs{background:#fff;border-bottom:1px solid #e5e7eb;display:flex;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tab{flex:1;padding:12px 8px;font-size:13px;font-weight:600;border:none;background:none;border-bottom:3px solid transparent;cursor:pointer;color:#6b7280;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.tab:hover{background:#fef2f2;color:#b91c1c}
.tab.on{color:#b91c1c;border-bottom-color:#b91c1c;background:#fef2f2}
.tab i{font-size:14px}
/* MAIN */
.main{max-width:680px;margin:0 auto;padding:16px}
/* GOAL BANNER */
.goal{background:linear-gradient(135deg,#059669,#0d9488);color:#fff;border-radius:16px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;box-shadow:0 4px 16px rgba(5,150,105,.3)}
.goal h2{font-size:18px;font-weight:800;margin-bottom:4px}
.goal p{font-size:12px;opacity:.9}
.goal-count{text-align:center}
.goal-count .big{font-size:40px;font-weight:800;line-height:1}
.goal-count .sm{font-size:11px;opacity:.85}
/* AUDIO NOTICE */
.anote{display:none;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#1d4ed8}
.anote.show{display:flex;align-items:center;gap:8px}
/* LESSON CARD */
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1);margin-bottom:16px}
.card-hd{background:linear-gradient(135deg,#ef4444,#ec4899);color:#fff;padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-hd h2{font-size:20px;font-weight:800;color:#fff}
.card-hd p{font-size:12px;opacity:.85;margin-top:3px}
.dur{background:rgba(255,255,255,.25);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;color:#fff}
/* SUB NAV */
.subnav{background:#f9fafb;padding:10px 14px;border-bottom:1px solid #f3f4f6;display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;border:1.5px solid #d1d5db;background:#fff;cursor:pointer;color:#374151;transition:all .15s}
.pill:hover{background:#fef2f2;border-color:#f87171;color:#b91c1c}
.pill.on{background:#b91c1c;color:#fff;border-color:#b91c1c}
.pill.dn{background:#f0fdf4;color:#166534;border-color:#86efac}
/* LESSON BODY */
.body{padding:20px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh span{font-size:15px;font-weight:800;color:#111}
/* VOCAB ROWS */
.vrow{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;border:2px solid #dbeafe;background:linear-gradient(135deg,#eff6ff,#f5f3ff);margin-bottom:10px;transition:all .2s;box-shadow:0 2px 8px rgba(99,102,241,.08)}
.vrow:hover{box-shadow:0 4px 16px rgba(99,102,241,.15);transform:translateY(-1px)}
.vrow.pl{border-color:#ef4444;background:linear-gradient(135deg,#fff5f5,#fdf2f8)}
.vl{display:flex;align-items:center;gap:14px;flex:1}
.vc{font-size:32px;font-weight:800;color:#b91c1c;min-width:48px;line-height:1}
.vpn{font-size:15px;color:#1d4ed8;font-family:monospace;font-weight:600}
.ve{font-size:12px;color:#6b7280;margin-top:2px}
.spk{width:38px;height:38px;border-radius:10px;border:2px solid #dbeafe;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:#6b7280}
.spk:hover{border-color:#ef4444;background:#fff5f5;color:#ef4444}
.spk.pl{border-color:#ef4444;background:#fff5f5;color:#ef4444}
/* PLAY ALL */
.pall{padding:8px 14px;background:linear-gradient(135deg,#ef4444,#ec4899);color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(239,68,68,.3);transition:all .15s}
.pall:hover{box-shadow:0 4px 14px rgba(239,68,68,.4);transform:translateY(-1px)}
/* TIP BOX */
.tip{background:#fffbeb;border:2px solid #fde68a;border-radius:12px;padding:12px 16px;margin-top:14px;display:flex;gap:10px;align-items:flex-start}
.tip i{color:#d97706;font-size:18px;margin-top:1px;flex-shrink:0}
.tip-t{font-size:12px;font-weight:700;color:#92400e;margin-bottom:3px}
.tip-b{font-size:12px;color:#78350f;line-height:1.6}
/* ACTION BUTTONS */
.acts{display:flex;gap:10px;margin-top:18px}
.bq{flex:1;padding:13px;background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 14px rgba(37,99,235,.35);transition:all .15s}
.bq:hover{box-shadow:0 6px 20px rgba(37,99,235,.45);transform:translateY(-1px)}
.bc{padding:13px 18px;background:linear-gradient(135deg,#16a34a,#059669);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(22,163,74,.35);transition:all .15s;white-space:nowrap}
.bc:hover{box-shadow:0 6px 20px rgba(22,163,74,.45);transform:translateY(-1px)}
.bdone{padding:13px 18px;background:#f0fdf4;color:#166534;border:2px solid #86efac;border-radius:12px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;white-space:nowrap}
/* COMPLETION BANNER */
.cbanner{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:2px solid #86efac;border-radius:14px;padding:20px;text-align:center;margin-top:16px;box-shadow:0 4px 16px rgba(22,163,74,.1)}
.cbanner h3{font-size:18px;font-weight:800;color:#14532d;margin-bottom:6px}
.cbanner p{font-size:13px;color:#166534;margin-bottom:14px}
.bnext{padding:11px 22px;background:linear-gradient(135deg,#16a34a,#059669);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(22,163,74,.35);transition:all .15s}
.bnext:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(22,163,74,.45)}
/* NO CONTENT */
.nocont{padding:24px;text-align:center}
.nocont p{font-size:14px;color:#6b7280;margin-bottom:14px}
/* QUIZ */
.qwrap{background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:20px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.qhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.qhd h3{font-size:17px;font-weight:800}
.qpill{background:linear-gradient(135deg,#eff6ff,#f5f3ff);border:1.5px solid #c7d2fe;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#4338ca}
.qq{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;padding:14px 16px;border-radius:12px;margin-bottom:12px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;box-shadow:0 4px 16px rgba(99,102,241,.3)}
.qq p{font-size:14px;font-weight:600;flex:1;line-height:1.5;color:#fff}
.qlisten{padding:7px 12px;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);border-radius:8px;font-size:12px;color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;flex-shrink:0;transition:all .15s}
.qlisten:hover{background:rgba(255,255,255,.3)}
.qopts{display:grid;gap:8px}
.qopt{width:100%;padding:12px 14px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;text-align:left;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;color:#111;transition:all .15s;font-weight:500}
.qopt:hover:not([disabled]){border-color:#6366f1;background:#f5f3ff}
.qopt.cor{border-color:#16a34a;background:#f0fdf4;color:#14532d}
.qopt.wrg{border-color:#dc2626;background:#fef2f2;color:#7f1d1d}
.oll{width:26px;height:26px;border-radius:50%;background:#f3f4f6;border:1.5px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.qstat{background:linear-gradient(135deg,#f8fafc,#f1f5f9);border-radius:10px;padding:12px;text-align:center;margin-top:10px;border:1px solid #e2e8f0}
.qstat .scr{font-size:18px;font-weight:800}
.qstat .ht{font-size:12px;color:#6b7280;margin-top:3px}
.qfail{background:#fef2f2;border:2px solid #fca5a5;border-radius:12px;padding:16px;text-align:center;margin-top:12px}
.qfail p{font-size:13px;color:#991b1b;margin-bottom:10px;line-height:1.5}
.bretry{padding:9px 20px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(239,68,68,.3)}
.bretry:hover{box-shadow:0 4px 14px rgba(239,68,68,.4)}
/* PROGRESS TAB */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px}
.mc{background:#fff;border-radius:14px;padding:14px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.mc.orange{border:2px solid #fed7aa}
.mc.blue{border:2px solid #bfdbfe}
.mc.green{border:2px solid #bbf7d0}
.mc.purple{border:2px solid #e9d5ff}
.mc .icon-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.mc .icon-row i{font-size:14px}
.mc.orange .icon-row i{color:#f97316}
.mc.blue .icon-row i{color:#3b82f6}
.mc.green .icon-row i{color:#22c55e}
.mc.purple .icon-row i{color:#a855f7}
.mc .icon-row span{font-size:12px;font-weight:700}
.mc.orange .icon-row span{color:#f97316}
.mc.blue .icon-row span{color:#3b82f6}
.mc.green .icon-row span{color:#22c55e}
.mc.purple .icon-row span{color:#a855f7}
.mc .val{font-size:28px;font-weight:800;color:#111}
.mc .lbl{font-size:10px;color:#6b7280;margin-top:2px}
.pblock{background:#fff;border-radius:16px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.pblock h3{font-size:16px;font-weight:800;margin-bottom:16px}
.prow{margin-bottom:16px;padding:14px;border:2px solid #f3f4f6;border-radius:12px;transition:border-color .2s}
.prow:last-child{margin-bottom:0}
.prow:hover{border-color:#fca5a5}
.prow-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prow-t{font-size:13px;font-weight:700}
.prow-c{font-size:12px;font-weight:700;color:#6b7280}
.pbg{background:#f3f4f6;border-radius:999px;height:10px}
.pfill{background:linear-gradient(135deg,#ef4444,#ec4899);height:10px;border-radius:999px;transition:width .6s ease}
/* ALL LESSONS */
.mcard{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:14px}
.mhd{background:linear-gradient(135deg,#ef4444,#ec4899);color:#fff;padding:14px 18px}
.mhd h3{font-size:15px;font-weight:800;color:#fff}
.mhd p{font-size:11px;opacity:.85;margin-top:2px}
.wsec{padding:10px 14px;border-bottom:1px solid #f9fafb}
.wsec:last-child{border-bottom:none}
.wlbl{font-size:11px;font-weight:700;color:#374151;margin-bottom:7px}
.li{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:10px;border:2px solid #f3f4f6;margin-bottom:5px;cursor:pointer;transition:all .15s;background:#f9fafb}
.li:hover{background:#eff6ff;border-color:#bfdbfe}
.li.dn{background:#f0fdf4;border-color:#86efac}
.li-l{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#374151}
.li.dn .li-l{color:#166534}
.li-r{font-size:11px;color:#9ca3af;font-weight:500}
</style>
</head>

<script>
const CONTENT={
  "1-1-0":{chinese:["妈","麻","马","骂"],pinyin:["mā","má","mǎ","mà"],english:["mother","numb","horse","scold"],tip:"Same syllable, four tones = four different words. Tone 1 is high and flat, 2 rises, 3 dips then rises, 4 falls sharply."},
  "1-1-1":{chinese:["你好","早上好","晚安","再见"],pinyin:["nǐ hǎo","zǎoshang hǎo","wǎn ān","zàijiàn"],english:["hello","good morning","good night","goodbye"],tip:"你好 works any time of day. 再见 literally means 'see you again' — like au revoir in French."},
  "1-1-2":{chinese:["一","二","三","四","五"],pinyin:["yī","èr","sān","sì","wǔ"],english:["one","two","three","four","five"],tip:"Each number uses a different tone. Counting to 5 is secretly a full tone workout!"},
  "1-2-0":{chinese:["我叫","你叫什么","我是","很高兴认识你"],pinyin:["wǒ jiào","nǐ jiào shénme","wǒ shì","hěn gāoxìng rènshi nǐ"],english:["my name is","what's your name","I am","nice to meet you"],tip:"叫 = called/named. 是 = am/is/are. Use 我叫 for names, 我是 for your role or nationality."},
  "1-2-1":{chinese:["六","七","八","九","十"],pinyin:["liù","qī","bā","jiǔ","shí"],english:["six","seven","eight","nine","ten"],tip:"You can now count to 10! 十 + number builds 11–19: 十一, 十二, 十三..."},
  "1-2-2":{chinese:["中国","美国","英国","你是哪国人"],pinyin:["Zhōngguó","Měiguó","Yīngguó","nǐ shì nǎ guó rén"],english:["China","America","England","what's your nationality"],tip:"Country + 人 (rén) = person from there. 中国人 = Chinese person, 美国人 = American."},
  "1-3-0":{chinese:["我要","这个","那个","多少钱"],pinyin:["wǒ yào","zhège","nàge","duōshao qián"],english:["I want","this one","that one","how much"],tip:"Just 4 phrases let you shop anywhere in China. Point, say 这个 or 那个, then ask 多少钱."},
  "1-3-1":{chinese:["水","茶","咖啡","可乐","啤酒"],pinyin:["shuǐ","chá","kāfēi","kělè","píjiǔ"],english:["water","tea","coffee","cola","beer"],tip:"Add 我要 to order: 我要茶 = I want tea. 咖啡 (kāfēi) sounds very close to 'coffee'!"},
  "1-3-2":{chinese:["请","谢谢","对不起","没关系"],pinyin:["qǐng","xièxie","duìbuqǐ","méi guānxi"],english:["please","thank you","sorry","no problem"],tip:"谢谢 — the second 谢 is a light neutral tone. Use 对不起 for real apologies."},
  "1-4-0":{chinese:["今天","明天","昨天","现在","星期"],pinyin:["jīntiān","míngtiān","zuótiān","xiànzài","xīngqī"],english:["today","tomorrow","yesterday","now","week"],tip:"星期 + number = weekday: 星期一 = Monday, 星期二 = Tuesday, 星期天 = Sunday."},
  "1-4-1":{chinese:["早上","中午","下午","晚上","几点"],pinyin:["zǎoshang","zhōngwǔ","xiàwǔ","wǎnshang","jǐ diǎn"],english:["morning","noon","afternoon","evening","what time"],tip:"几点 (jǐ diǎn) = what time? Add a number: 三点 = 3 o'clock. Very simple!"},
  "1-4-2":{chinese:["我们去","好","可以","不行","走吧"],pinyin:["wǒmen qù","hǎo","kěyǐ","bù xíng","zǒu ba"],english:["let's go","ok/good","can/possible","not ok","let's go!"],tip:"吧 adds a 'shall we?' feeling to any suggestion — very natural in spoken Mandarin."},
  "2-1-0":{chinese:["爸爸","妈妈","哥哥","姐姐","弟弟","妹妹"],pinyin:["bàba","māma","gēge","jiějie","dìdi","mèimei"],english:["father","mother","older brother","older sister","younger brother","younger sister"],tip:"Chinese always specifies older vs younger siblings. 哥/姐 = older, 弟/妹 = younger."},
  "2-1-1":{chinese:["很高","很矮","很胖","很瘦","很帅"],pinyin:["hěn gāo","hěn ǎi","hěn pàng","hěn shòu","hěn shuài"],english:["very tall","very short","very chubby","very slim","very handsome"],tip:"很 (hěn) softens adjectives. Without it the sentence sounds like a blunt comparison."},
  "2-1-2":{chinese:["朋友","同事","老师","学生","这是我的"],pinyin:["péngyou","tóngshì","lǎoshī","xuésheng","zhè shì wǒ de"],english:["friend","colleague","teacher","student","this is my"],tip:"Introduce people: 这是我的朋友 = This is my friend. 的 (de) is the possessive marker."},
  "2-2-0":{chinese:["医生","护士","老师","工程师","厨师"],pinyin:["yīshēng","hùshi","lǎoshī","gōngchéngshī","chúshī"],english:["doctor","nurse","teacher","engineer","chef"],tip:"我是 + job = I am a [job]. No article needed in Chinese! 我是医生 = I am a doctor."},
  "2-2-1":{chinese:["工作","学习","休息","忙","累"],pinyin:["gōngzuò","xuéxí","xiūxi","máng","lèi"],english:["work","study","rest","busy","tired"],tip:"我很忙 = I'm very busy. 累 (lèi) = tired from effort. Different from 困 (kùn) = sleepy."},
  "2-2-2":{chinese:["上课","下课","考试","作业","书"],pinyin:["shàngkè","xiàkè","kǎoshì","zuòyè","shū"],english:["start class","end class","exam","homework","book"],tip:"上 = start/up, 下 = end/down. Pattern repeats: 上班 = start work, 下班 = finish work."},
  "2-3-0":{chinese:["我喜欢","打篮球","踢足球","游泳","跑步"],pinyin:["wǒ xǐhuan","dǎ lánqiú","tī zúqiú","yóuyǒng","pǎobù"],english:["I like","play basketball","play soccer","swim","run"],tip:"打 = hand sports, 踢 = kicking sports. 我喜欢 + activity starts any hobby conversation."},
  "2-3-1":{chinese:["看电影","听音乐","看书","玩游戏"],pinyin:["kàn diànyǐng","tīng yīnyuè","kàn shū","wán yóuxì"],english:["watch movies","listen to music","read books","play games"],tip:"看 = watch or read, 听 = listen, 玩 = play games. Three essential verbs!"},
  "2-3-2":{chinese:["周末","我想","你想吗","好啊","不想"],pinyin:["zhōumò","wǒ xiǎng","nǐ xiǎng ma","hǎo a","bù xiǎng"],english:["weekend","I want to","do you want to","sure!","don't want to"],tip:"吗 at the end turns any statement into a yes/no question. 好啊 — the 啊 adds warmth."},
  "2-4-0":{chinese:["好吃","难吃","好喝","我觉得","不错"],pinyin:["hǎochī","nánchī","hǎohē","wǒ juéde","búcuò"],english:["delicious","bad tasting","tasty (drink)","I think","not bad"],tip:"不错 (búcuò) literally means 'not wrong' — a very common way to say 'pretty good'."},
  "2-4-1":{chinese:["比","更","最","一样","不一样"],pinyin:["bǐ","gèng","zuì","yīyàng","bù yīyàng"],english:["compared to","more","most","same","different"],tip:"A 比 B + adjective: 苹果比香蕉甜 = Apples are sweeter than bananas. 最 = superlative."},
  "2-4-2":{chinese:["我喜欢","我更喜欢","我最喜欢","都可以","随便"],pinyin:["wǒ xǐhuan","wǒ gèng xǐhuan","wǒ zuì xǐhuan","dōu kěyǐ","suíbiàn"],english:["I like","I prefer","I like most","either is fine","whatever"],tip:"随便 (suíbiàn) = 'whatever/up to you' — incredibly useful in casual conversation."}
};

const PLAN={
  1:{title:"Month 1: Survival Chinese",focus:"Greetings, numbers, basic needs",weeks:{
    1:{title:"Sounds & Tones",lessons:[{title:"The 4 Tones",type:"pronunciation",duration:"8 min"},{title:"Greetings",type:"conversation",duration:"7 min"},{title:"Numbers 1–5",type:"vocabulary",duration:"6 min"}]},
    2:{title:"Introducing Yourself",lessons:[{title:"My Name Is...",type:"conversation",duration:"8 min"},{title:"Numbers 6–10",type:"vocabulary",duration:"6 min"},{title:"Countries",type:"conversation",duration:"7 min"}]},
    3:{title:"Getting What You Need",lessons:[{title:"I Want...",type:"conversation",duration:"8 min"},{title:"Drinks & Food",type:"vocabulary",duration:"7 min"},{title:"Being Polite",type:"conversation",duration:"6 min"}]},
    4:{title:"Time & Plans",lessons:[{title:"Time Words",type:"vocabulary",duration:"7 min"},{title:"Times of Day",type:"conversation",duration:"8 min"},{title:"Let's Go!",type:"conversation",duration:"6 min"}]}
  }},
  2:{title:"Month 2: Daily Life",focus:"Family, work, hobbies, opinions",weeks:{
    1:{title:"Family & People",lessons:[{title:"Family Members",type:"vocabulary",duration:"7 min"},{title:"Describing People",type:"conversation",duration:"8 min"},{title:"Relationships",type:"conversation",duration:"7 min"}]},
    2:{title:"Work & Study",lessons:[{title:"Jobs",type:"vocabulary",duration:"7 min"},{title:"Work Life",type:"conversation",duration:"8 min"},{title:"School",type:"conversation",duration:"7 min"}]},
    3:{title:"Free Time",lessons:[{title:"Sports",type:"vocabulary",duration:"7 min"},{title:"Entertainment",type:"conversation",duration:"8 min"},{title:"Weekend Plans",type:"conversation",duration:"7 min"}]},
    4:{title:"Expressing Yourself",lessons:[{title:"Tastes & Opinions",type:"conversation",duration:"8 min"},{title:"Comparing",type:"grammar",duration:"9 min"},{title:"Preferences",type:"conversation",duration:"7 min"}]}
  }},
  3:{title:"Month 3: Out & About",focus:"Shopping, dining, travel",weeks:{
    1:{title:"Shopping",lessons:[{title:"At the Market",type:"conversation",duration:"8 min"},{title:"Bargaining",type:"conversation",duration:"9 min"},{title:"Sizes & Colors",type:"vocabulary",duration:"7 min"}]},
    2:{title:"Restaurants",lessons:[{title:"Ordering Food",type:"conversation",duration:"8 min"},{title:"Food Preferences",type:"conversation",duration:"7 min"},{title:"Paying the Bill",type:"conversation",duration:"6 min"}]},
    3:{title:"Getting Around",lessons:[{title:"Directions",type:"conversation",duration:"9 min"},{title:"Transportation",type:"vocabulary",duration:"7 min"},{title:"Taking a Taxi",type:"conversation",duration:"7 min"}]},
    4:{title:"Problems",lessons:[{title:"Asking for Help",type:"conversation",duration:"8 min"},{title:"Emergencies",type:"conversation",duration:"9 min"},{title:"Complaints",type:"conversation",duration:"7 min"}]}
  }},
  4:{title:"Month 4: Complex Communication",focus:"Time, emotions, descriptions",weeks:{
    1:{title:"Time & Experiences",lessons:[{title:"Past Tense",type:"grammar",duration:"9 min"},{title:"Future Plans",type:"conversation",duration:"8 min"},{title:"Duration",type:"grammar",duration:"8 min"}]},
    2:{title:"Emotions",lessons:[{title:"Feelings",type:"conversation",duration:"7 min"},{title:"Worries & Comfort",type:"conversation",duration:"8 min"},{title:"Celebrations",type:"conversation",duration:"7 min"}]},
    3:{title:"Descriptions",lessons:[{title:"Physical Details",type:"vocabulary",duration:"7 min"},{title:"Locations",type:"grammar",duration:"8 min"},{title:"Weather",type:"conversation",duration:"7 min"}]},
    4:{title:"Storytelling",lessons:[{title:"Narrating Events",type:"conversation",duration:"9 min"},{title:"Cause & Effect",type:"grammar",duration:"8 min"},{title:"Sequencing",type:"grammar",duration:"8 min"}]}
  }},
  5:{title:"Month 5: Advanced Fluency",focus:"Culture, idioms, natural conversation",weeks:{
    1:{title:"Culture",lessons:[{title:"Cultural Concepts",type:"culture",duration:"10 min"},{title:"Formality Levels",type:"conversation",duration:"9 min"},{title:"Business Talk",type:"conversation",duration:"9 min"}]},
    2:{title:"Idioms",lessons:[{title:"Common Idioms",type:"vocabulary",duration:"9 min"},{title:"Proverbs",type:"culture",duration:"8 min"},{title:"Modern Slang",type:"vocabulary",duration:"8 min"}]},
    3:{title:"Abstract Concepts",lessons:[{title:"Philosophy",type:"conversation",duration:"10 min"},{title:"Hypotheticals",type:"grammar",duration:"9 min"},{title:"Debates",type:"conversation",duration:"10 min"}]},
    4:{title:"Fluency Integration",lessons:[{title:"Natural Conversation",type:"conversation",duration:"10 min"},{title:"Complex Situations",type:"conversation",duration:"10 min"},{title:"Cultural Integration",type:"culture",duration:"10 min"}]}
  }}
};

const S={month:1,week:1,lesson:0,tab:'today',done:new Set(),playingId:null,streak:1,todayDone:0,inQuiz:false,showCompletion:false};
const Q={exercises:[],index:0,score:0,answered:null,failed:false};
let safetyTimer=null;
let bound=false;

const resetAudio=()=>{clearTimeout(safetyTimer);safetyTimer=null;S.playingId=null;render();};
const speak=(text,id)=>{
  if(!text)return;
  clearTimeout(safetyTimer);
  if(!('speechSynthesis'in window)){const el=document.getElementById('anote');if(el)el.classList.add('show');return;}
  window.speechSynthesis.cancel();
  S.playingId=id;render();
  try{
    const u=new SpeechSynthesisUtterance(text);
    u.lang='zh-CN';u.rate=0.72;
    const zh=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('zh'));
    if(zh)u.voice=zh;
    u.onend=resetAudio;u.onerror=resetAudio;
    safetyTimer=setTimeout(resetAudio,7000);
    window.speechSynthesis.speak(u);
  }catch(e){resetAudio();}
};
const stopAudio=()=>{clearTimeout(safetyTimer);if('speechSynthesis'in window)window.speechSynthesis.cancel();S.playingId=null;};

const wData=()=>PLAN[S.month]?.weeks?.[S.week]||{title:'',lessons:[]};
const lData=()=>wData().lessons?.[S.lesson]||{title:'',type:'',duration:'7 min'};
const lContent=()=>CONTENT[`${S.month}-${S.week}-${S.lesson}`]||null;
const lId=()=>`${S.month}-${S.week}-${S.lesson}`;

const validate=()=>{
  if(!PLAN[S.month])S.month=1;
  const wkeys=Object.keys(PLAN[S.month].weeks).map(Number);
  if(!wkeys.includes(S.week))S.week=wkeys[0];
  if(S.lesson>=wData().lessons.length)S.lesson=0;
};

const totalLessons=()=>Object.values(PLAN).reduce((t,m)=>t+Object.values(m.weeks).reduce((s,w)=>s+w.lessons.length,0),0);
const progPct=()=>Math.round(S.done.size/totalLessons()*100);
const monthProg=mn=>{let total=0,done=0;Object.entries(PLAN[mn].weeks).forEach(([wn,w])=>w.lessons.forEach((_,li)=>{total++;if(S.done.has(`${mn}-${wn}-${li}`))done++;}));return{done,total};};

const makeQ=(question,correct,wrongPool,audio)=>{
  const wrongs=wrongPool.filter(w=>w!==correct);
  while(wrongs.length<3)wrongs.push(wrongs[0]||'---');
  const opts=[correct,...wrongs.slice(0,3)];
  for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
  return{q:question,opts,correct:opts.indexOf(correct),audio};
};
const makeQuiz=c=>{
  if(!c?.chinese)return[{q:'Ready to continue?',opts:['Yes','Review','Next','Skip'],correct:0}];
  const qs=[
    makeQ('What does "'+c.chinese[0]+'" mean?',c.english[0],c.english.slice(1),c.chinese[0]),
    makeQ('How do you write "'+c.english[0]+'" in Chinese?',c.chinese[0],c.chinese.slice(1),c.chinese[0])
  ];
  if(c.chinese.length>1)qs.push(makeQ('What does "'+c.chinese[1]+'" mean?',c.english[1],c.english.filter((_,i)=>i!==1),c.chinese[1]));
  return qs;
};

const completeLesson=()=>{const id=lId(),was=S.done.has(id);S.done.add(id);if(!was)S.todayDone++;S.inQuiz=false;S.showCompletion=true;render();};
const nextLesson=()=>{S.showCompletion=false;const wd=wData(),wkeys=Object.keys(PLAN[S.month].weeks).map(Number);if(S.lesson<wd.lessons.length-1)S.lesson++;else{const nw=wkeys.find(w=>w>S.week);if(nw){S.week=nw;S.lesson=0;}}render();};
const startQuiz=()=>{Q.exercises=makeQuiz(lContent());Q.index=0;Q.score=0;Q.answered=null;Q.failed=false;S.inQuiz=true;S.showCompletion=false;render();};
const answerQ=idx=>{
  if(Q.answered!==null)return;
  Q.answered=idx;if(idx===Q.exercises[Q.index].correct)Q.score++;render();
  setTimeout(()=>{
    if(Q.index<Q.exercises.length-1){Q.index++;Q.answered=null;render();}
    else{if(Q.score>=Math.ceil(Q.exercises.length/2))completeLesson();else{Q.failed=true;render();}}
  },1700);
};
const goTo=(mn,wn,li)=>{stopAudio();S.month=+mn;S.week=+wn;S.lesson=+li;S.tab='today';S.inQuiz=false;S.showCompletion=false;Q.answered=null;Q.failed=false;render();};

const render=()=>{
  validate();
  document.getElementById('root').innerHTML=buildApp();
  if(!bound){bound=true;document.getElementById('root').addEventListener('click',handleClick);}
};

const buildApp=()=>`
<div class="hdr">
  <div class="hdr-l"><h1>&#20013;&#25991; Mandarin</h1><p>10 minutes daily to fluency</p></div>
  <div class="hdr-r">
    <div class="streak-box">
      <i class="fa-solid fa-fire"></i>
      <div><span class="streak-num">${S.streak}</span><span class="streak-lbl">day streak</span></div>
    </div>
    <div class="prog-box">
      <div class="prog-num">${progPct()}%</div>
      <div class="prog-lbl">complete</div>
    </div>
  </div>
</div>
<div class="tabs">
  <button class="tab ${S.tab==='today'?'on':''}" data-a="tab" data-v="today"><i class="fa-solid fa-star"></i> Today's Lesson</button>
  <button class="tab ${S.tab==='progress'?'on':''}" data-a="tab" data-v="progress"><i class="fa-solid fa-chart-bar"></i> Progress</button>
  <button class="tab ${S.tab==='all'?'on':''}" data-a="tab" data-v="all"><i class="fa-solid fa-book"></i> All Lessons</button>
</div>
<div class="main">${S.tab==='today'?buildToday():S.tab==='progress'?buildProgress():buildAll()}</div>`;

const buildToday=()=>{
  if(S.inQuiz)return buildQuiz();
  const mn=PLAN[S.month]||{},wd=wData(),ld=lData(),c=lContent(),id=lId(),done=S.done.has(id),rem=Math.max(0,3-S.todayDone);
  return`
<div class="goal">
  <div>
    <h2>Today's Goal: 10 Minutes</h2>
    <p>Complete ${rem>0?rem+' more '+(rem===1?'lesson':'lessons')+' today!':'Goal achieved! Great work.'}</p>
  </div>
  <div class="goal-count"><div class="big">${S.todayDone}/3</div><div class="sm">lessons</div></div>
</div>
<div id="anote" class="anote"><i class="fa-solid fa-circle-info"></i> Audio not supported in this browser. Try Chrome or Safari.</div>
<div class="card">
  <div class="card-hd">
    <div><h2>${ld.title}</h2><p>Month ${S.month}, Week ${S.week} &bull; ${ld.type}</p></div>
    <span class="dur">${ld.duration}</span>
  </div>
  <div class="subnav">${Object.keys(mn.weeks||{}).map(wn=>`<button class="pill ${S.week==wn?'on':''}" data-a="week" data-v="${wn}">Week ${wn}</button>`).join('')}</div>
  <div class="subnav">${(wd.lessons||[]).map((l,i)=>{const lid=`${S.month}-${S.week}-${i}`,dc=S.done.has(lid);return`<button class="pill ${S.lesson===i?'on':dc?'dn':''}" data-a="lesson" data-v="${i}">${dc?'<i class="fa-solid fa-check"></i> ':''}${l.title}</button>`;}).join('')}</div>
  <div class="body">${c?buildVocab(c,done):buildNoContent(done)}${S.showCompletion?buildCompletionBanner():''}</div>
</div>`;
};

const buildVocab=(c,done)=>`
<div class="sh">
  <span>&#128218; Learn These</span>
  <button class="pall" data-a="playall"><i class="fa-solid fa-play"></i> Play All</button>
</div>
${c.chinese.map((ch,i)=>`
<div class="vrow ${S.playingId===i?'pl':''}">
  <div class="vl">
    <span class="vc">${ch}</span>
    <div><div class="vpn">${c.pinyin[i]}</div><div class="ve">${c.english[i]}</div></div>
  </div>
  <button class="spk ${S.playingId===i?'pl':''}" data-a="speak" data-i="${i}">
    <i class="fa-solid ${S.playingId===i?'fa-pause':'fa-volume-high'}"></i>
  </button>
</div>`).join('')}
<div class="tip">
  <i class="fa-solid fa-lightbulb"></i>
  <div><div class="tip-t">Pro Tip</div><div class="tip-b">${c.tip}</div></div>
</div>
${!S.showCompletion?`
<div class="acts">
  <button class="bq" data-a="quiz"><i class="fa-solid fa-bullseye"></i> Start Quiz</button>
  ${done?'<div class="bdone"><i class="fa-solid fa-check"></i> Completed</div>':'<button class="bc" data-a="complete"><i class="fa-solid fa-check"></i> Mark Complete</button>'}
</div>`:''}`;

const buildNoContent=done=>`
<div class="nocont">
  <p>&#128214; More content coming soon! Mark as reviewed to continue.</p>
  ${done?'<div class="bdone"><i class="fa-solid fa-check"></i> Completed</div>':'<button class="bc" data-a="complete"><i class="fa-solid fa-check"></i> Mark as Reviewed</button>'}
</div>`;

const buildCompletionBanner=()=>`
<div class="cbanner">
  <h3>&#127881; Lesson Complete!</h3>
  <p>Consistency is the key to fluency. Keep going!</p>
  <button class="bnext" data-a="next">Next Lesson <i class="fa-solid fa-arrow-right"></i></button>
</div>`;

const buildQuiz=()=>{
  const ex=Q.exercises[Q.index];
  if(Q.failed)return`
<div class="qwrap">
  <div class="qhd"><h3>Quiz Result</h3><span class="qpill">${Q.score}/${Q.exercises.length}</span></div>
  <div class="qfail">
    <p>You scored ${Q.score}/${Q.exercises.length}. You need at least ${Math.ceil(Q.exercises.length/2)} correct to pass. Review the lesson and try again!</p>
    <button class="bretry" data-a="retry">Try Again</button>
  </div>
  <button class="bq" style="margin-top:12px;width:100%" data-a="back"><i class="fa-solid fa-arrow-left"></i> Back to Lesson</button>
</div>`;
  return`
<div class="qwrap">
  <div class="qhd"><h3>Quick Quiz</h3><span class="qpill">Q${Q.index+1} of ${Q.exercises.length}</span></div>
  <div class="qq">
    <p>${ex.q}</p>
    ${ex.audio?`<button class="qlisten" data-a="qaudio" data-t="${ex.audio}"><i class="fa-solid fa-volume-high"></i> Listen</button>`:''}
  </div>
  <div class="qopts">
    ${ex.opts.map((o,i)=>{
      let cls='qopt';
      if(Q.answered!==null){if(i===ex.correct)cls+=' cor';else if(i===Q.answered)cls+=' wrg';}
      return`<button class="${cls}" data-a="ans" data-i="${i}"${Q.answered!==null?' disabled':''}><span class="oll">${'ABCD'[i]}</span>${o}${Q.answered!==null&&i===ex.correct?' <i class="fa-solid fa-check"></i>':''}</button>`;
    }).join('')}
  </div>
  <div class="qstat">
    <div class="scr">Score: ${Q.score} / ${Q.exercises.length}</div>
    ${Q.answered!==null?`<div class="ht">${Q.index<Q.exercises.length-1?'Next question...':Q.score>=Math.ceil(Q.exercises.length/2)?'Passed! Great job &#127881;':'See your result...'}</div>`:''}
  </div>
</div>`;
};

const buildProgress=()=>`
<div class="sgrid">
  <div class="mc orange">
    <div class="icon-row"><i class="fa-solid fa-fire"></i><span>Streak</span></div>
    <div class="val">${S.streak}</div><div class="lbl">days</div>
  </div>
  <div class="mc blue">
    <div class="icon-row"><i class="fa-solid fa-trophy"></i><span>Progress</span></div>
    <div class="val">${progPct()}%</div><div class="lbl">complete</div>
  </div>
  <div class="mc green">
    <div class="icon-row"><i class="fa-solid fa-circle-check"></i><span>Lessons</span></div>
    <div class="val">${S.done.size}</div><div class="lbl">completed</div>
  </div>
  <div class="mc purple">
    <div class="icon-row"><i class="fa-solid fa-star"></i><span>Today</span></div>
    <div class="val">${S.todayDone}/3</div><div class="lbl">lessons</div>
  </div>
</div>
<div class="pblock">
  <h3>Your Journey</h3>
  ${Object.entries(PLAN).map(([mn,md])=>{
    const{done,total}=monthProg(mn),pct=total?Math.round(done/total*100):0;
    return`<div class="prow">
      <div class="prow-hd"><span class="prow-t">${md.title}</span><span class="prow-c">${done}/${total}</span></div>
      <div class="pbg"><div class="pfill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('')}
</div>`;

const buildAll=()=>Object.entries(PLAN).map(([mn,md])=>`
<div class="mcard">
  <div class="mhd"><h3>${md.title}</h3><p>${md.focus}</p></div>
  ${Object.entries(md.weeks).map(([wn,wd])=>`
    <div class="wsec">
      <div class="wlbl">Week ${wn}: ${wd.title}</div>
      ${wd.lessons.map((l,li)=>{
        const id=`${mn}-${wn}-${li}`,dc=S.done.has(id);
        return`<div class="li ${dc?'dn':''}" data-a="goto" data-m="${mn}" data-w="${wn}" data-l="${li}">
          <div class="li-l">${dc?'<i class="fa-solid fa-check"></i>':'<i class="fa-regular fa-circle"></i>'} ${l.title}</div>
          <span class="li-r">${l.duration}</span>
        </div>`;
      }).join('')}
    </div>`).join('')}
</div>`).join('');

const handleClick=e=>{
  const t=e.target.closest('[data-a]');if(!t)return;
  const a=t.dataset.a;
  if(a==='tab'){stopAudio();S.tab=t.dataset.v;S.inQuiz=false;render();}
  else if(a==='week'){stopAudio();S.week=+t.dataset.v;S.lesson=0;S.inQuiz=false;S.showCompletion=false;Q.answered=null;Q.failed=false;render();}
  else if(a==='lesson'){stopAudio();S.lesson=+t.dataset.v;S.inQuiz=false;S.showCompletion=false;Q.answered=null;Q.failed=false;render();}
  else if(a==='speak'){const i=+t.dataset.i,c=lContent();if(S.playingId===i){stopAudio();render();return;}if(c)speak(c.chinese[i],i);}
  else if(a==='playall'){const c=lContent();if(!c)return;if(S.playingId==='all'){stopAudio();render();return;}speak(c.chinese.join(' '),'all');}
  else if(a==='quiz')startQuiz();
  else if(a==='complete')completeLesson();
  else if(a==='next')nextLesson();
  else if(a==='ans')answerQ(+t.dataset.i);
  else if(a==='retry')startQuiz();
  else if(a==='back'){S.inQuiz=false;Q.failed=false;render();}
  else if(a==='qaudio')speak(t.dataset.t,'quiz');
  else if(a==='goto')goTo(t.dataset.m,t.dataset.w,t.dataset.l);
};

if('speechSynthesis'in window){window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();window.speechSynthesis.getVoices();}
render();
</script>
</body>
</html>
